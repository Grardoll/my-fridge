<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我家冰箱清單</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 20px auto; padding: 10px; background-color: #f4f4f9; }
        h2 { color: #333; text-align: center; }
        .input-group { display: flex; gap: 5px; margin-bottom: 20px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .input-group input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #007bff; color: white; }
        .btn-qty { width: 30px; height: 30px; cursor: pointer; border: none; background: #e0e0e0; border-radius: 4px; font-weight: bold; }
        .btn-qty:hover { background: #ccc; }
        .btn-add { background-color: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        .count-display { display: inline-block; width: 30px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

    <h2>❄️ 我的冰箱食材內容</h2>

    <!-- 新增食材欄位 -->
    <div class="input-group">
        <input type="text" id="itemName" placeholder="項目 (如: 雞蛋)" style="flex: 2;">
        <input type="number" id="itemQty" placeholder="數量" style="flex: 1;" min="1" value="1">
        <input type="text" id="itemUnit" placeholder="單位" style="flex: 1;">
        <button class="btn-add" onclick="addNewItem()">新增</button>
    </div>

    <!-- 食材表格 -->
    <table id="inventoryTable">
        <thead>
            <tr>
                <th>食材名稱</th>
                <th>數量</th>
                <th>單位</th>
            </tr>
        </thead>
        <tbody id="inventoryBody">
            <!-- 預設食材將顯示於此 -->
        </tbody>
    </table>

    <script>
        // 初始食材資料
        let inventory = [
            { name: "高麗菜", qty: 1, unit: "顆" },
            { name: "牛肉", qty: 3, unit: "片" },
            { name: "鯖魚", qty: 2, unit: "條" },
            { name: "鱸魚", qty: 1, unit: "條" },
            { name: "豆腐", qty: 3, unit: "片" }
        ];

        function renderTable() {
            const body = document.getElementById('inventoryBody');
            body.innerHTML = "";
            inventory.forEach((item, index) => {
                body.innerHTML += `
                    <tr>
                        <td>${item.name}</td>
                        <td>
                            <button class="btn-qty" onclick="updateQty(${index}, -1)">-</button>
                            <span class="count-display">${item.qty}</span>
                            <button class="btn-qty" onclick="updateQty(${index}, 1)">+</button>
                        </td>
                        <td>${item.unit}</td>
                    </tr>
                `;
            });
        }

        function updateQty(index, change) {
            inventory[index].qty += change;
            if (inventory[index].qty < 0) inventory[index].qty = 0;
            renderTable();
        }

        function addNewItem() {
            const name = document.getElementById('itemName').value;
            const qty = parseInt(document.getElementById('itemQty').value);
            const unit = document.getElementById('itemUnit').value;

            if (name && !isNaN(qty) && unit) {
                inventory.push({ name: name, qty: qty, unit: unit });
                renderTable();
                // 清空輸入框
                document.getElementById('itemName').value = "";
                document.getElementById('itemQty').value = "1";
                document.getElementById('itemUnit').value = "";
            } else {
                alert("請完整填寫食材名稱、數量與單位！");
            }
        }

        // 第一次執行顯示
        renderTable();
    </script>
</body>
</html>
